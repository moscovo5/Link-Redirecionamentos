<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links de Hospedagens</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b1e2d;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
  }

  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 420px; height: 420px; background: #1a6b9e; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 320px; height: 320px; background: #0d4d7a; bottom: -80px; right: -60px; animation-delay: -4s; }
  .orb3 { width: 200px; height: 200px; background: #2496c8; top: 40%; left: 60%; animation-delay: -7s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.06); }
  }

  .stars {
    position: fixed; inset: 0; z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to { opacity: 0.6; transform: scale(1.2); }
  }

  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    gap: 40px;
    padding: 50px 30px;
    max-width: 780px; width: 100%;
  }

  .header {
    text-align: center;
    animation: fadeDown 0.8s ease both;
  }
  .header .badge {
    display: inline-block;
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #7ec8e3; font-weight: 500;
    border: 1px solid rgba(126,200,227,0.3);
    padding: 5px 14px; border-radius: 20px;
    margin-bottom: 16px;
    background: rgba(126,200,227,0.06);
  }
  .header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .header h1 span {
    background: linear-gradient(90deg, #7ec8e3, #38a8d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    margin-top: 10px;
    font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 1px;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, #38a8d8, transparent);
    border-radius: 2px;
    animation: fadeDown 0.8s 0.2s ease both;
    opacity: 0; animation-fill-mode: forwards;
  }

  .cards {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.8s 0.3s ease both; opacity: 0; animation-fill-mode: forwards;
  }

  .card {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px;
    padding: 32px 28px 28px;
    width: 190px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    text-decoration: none;
    color: #fff;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.3), border-color 0.3s, background 0.3s, box-shadow 0.3s;
    cursor: pointer;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 20px;
    background: var(--glow);
    opacity: 0;
    transition: opacity 0.35s;
    z-index: 0;
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    transform: translateY(-10px) scale(1.04);
    border-color: var(--accent);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 30px var(--shadow);
  }
  .card .icon-wrap {
    position: relative; z-index: 1;
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--icon-bg);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.3);
  }
  .card:hover .icon-wrap {
    transform: scale(1.15) rotate(-5deg);
  }
  .card i {
    font-size: 1.7em;
    color: var(--accent);
    filter: drop-shadow(0 0 8px var(--shadow));
  }
  .card .label {
    position: relative; z-index: 1;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }
  .card .desc {
    position: relative; z-index: 1;
    font-size: 11px; color: rgba(255,255,255,0.35);
    text-align: center; line-height: 1.5;
  }
  .card .arrow {
    position: absolute; top: 14px; right: 16px; z-index: 1;
    opacity: 0; transform: translateX(-6px);
    transition: opacity 0.3s, transform 0.3s;
    color: var(--accent); font-size: 12px;
  }
  .card:hover .arrow { opacity: 1; transform: translateX(0); }

  .card-admin  { --accent: #7ec8e3; --shadow: rgba(126,200,227,0.4); --icon-bg: rgba(126,200,227,0.08); --glow: radial-gradient(ellipse at top, rgba(126,200,227,0.08), transparent 70%); }
  .card-rh     { --accent: #73d6b0; --shadow: rgba(115,214,176,0.4); --icon-bg: rgba(115,214,176,0.08); --glow: radial-gradient(ellipse at top, rgba(115,214,176,0.08), transparent 70%); }
  .card-fin    { --accent: #f0c274; --shadow: rgba(240,194,116,0.4); --icon-bg: rgba(240,194,116,0.08); --glow: radial-gradient(ellipse at top, rgba(240,194,116,0.08), transparent 70%); }

  .separator {
    display: flex; align-items: center; gap: 16px; width: 100%;
    max-width: 480px;
    animation: fadeUp 0.8s 0.5s ease both; opacity: 0; animation-fill-mode: forwards;
  }
  .sep-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .sep-text { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.2); text-transform: uppercase; }

  .github-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 28px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    text-decoration: none; color: #fff;
    transition: transform 0.3s cubic-bezier(.22,.68,0,1.3), border-color 0.3s, background 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.8s 0.6s ease both; opacity: 0; animation-fill-mode: forwards;
  }
  .github-btn:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .github-btn i { font-size: 1.3em; color: rgba(255,255,255,0.8); }
  .github-btn span {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .github-btn .gh-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .cards { flex-direction: column; align-items: center; }
    .card { width: 260px; flex-direction: row; gap: 18px; padding: 20px 24px; }
    .card .icon-wrap { width: 50px; height: 50px; flex-shrink: 0; }
    .card i { font-size: 1.4em; }
    .card .desc { display: none; }
  }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <div class="badge">Plataforma de gestão</div>
    <h1>Links de <span>Hospedagens</span></h1>
    <p>Acesso rápido aos painéis do sistema</p>
  </div>

  <div class="divider"></div>

  <div class="cards">
    <a href="https://moscovo5.github.io/pagina-dos-funcionarios/" class="card card-admin" target="_blank">
      <span class="arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
      <div class="icon-wrap"><i class="fa-brands fa-asymmetrik"></i></div>
      <span class="label">Funcionarios</span>
      <span class="desc">Visão dos Funcionarios</span>
    </a>
    <a href="https://moscovo5.github.io/newsletter/" class="card card-rh" target="_blank">
      <span class="arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
      <div class="icon-wrap"><i class="fa-solid fa-person"></i></i></div>
      <span class="label">Empresa</span>
      <span class="desc">Visão dos Clientes</span>
    </a>
    <a href="https://moscovo5.github.io/Download-of-Book/" class="card card-rh" target="_blank">
      <span class="arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
      <div class="icon-wrap"><i class="fa-solid fa-book"></i></div>
      <span class="label">Book</span>
      <span class="desc">Livro de Senhas das paginas</span>
    </a>
    
  </div>

  <div class="separator">
    <div class="sep-line"></div>
    <span class="sep-text">ou visite</span>
    <div class="sep-line"></div>
  </div>

  <a href="https://github.com/moscovo5" target="_blank" class="github-btn">
    <i class="fa-brands fa-github"></i>
    <span>GitHub</span>
    <div class="gh-dot"></div>
  </a>
</div>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      --d: ${2 + Math.random() * 4}s;
      animation-delay: ${Math.random() * 6}s;
    `;
    starsContainer.appendChild(s);
  }

  document.querySelectorAll('.card').forEach((card, i) => {
    card.style.animationDelay = `${0.35 + i * 0.1}s`;
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width - 0.5) * 12;
      const y = ((e.clientY - r.top) / r.height - 0.5) * 12;
      card.style.transform = `translateY(-10px) scale(1.04) rotateX(${-y}deg) rotateY(${x}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
</script>
</body>
</html>
